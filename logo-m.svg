<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- 火星渐变色 -->
        <linearGradient id="mars-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF7A00" />
            <stop offset="100%" stop-color="#E52E71" />
        </linearGradient>

        <!-- 发光特效 (基于放大后的尺寸调整了模糊半径) -->
        <filter id="glow" x="-20%" y="-20%" width="150%" height="150%">
            <feGaussianBlur stdDeviation="18" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- 毛玻璃播放键高光渐变 -->
        <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255, 255, 255, 0.4)" />
            <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)" />
        </linearGradient>
    </defs>

    <!-- 渲染背景 -->
<!--    <rect width="512" height="512" fill="url(#bg-grad)" rx="112" />-->

    <!-- 背景星辰点缀，避开中间放大的主体元素 -->
    <g fill="#fff">
        <circle cx="70" cy="70" r="1.5" opacity="0.6" />
        <circle cx="440" cy="100" r="2.5" opacity="0.8" />
        <circle cx="90" cy="430" r="1" opacity="0.4" />
        <circle cx="440" cy="410" r="1.5" opacity="0.5" />
        <circle cx="280" cy="50" r="2" opacity="0.7" />
        <circle cx="40" cy="250" r="1" opacity="0.3" />
        <circle cx="470" cy="260" r="1" opacity="0.3" />
        <circle cx="250" cy="470" r="1.5" opacity="0.5" />
    </g>

    <!-- Logo 图标主体 (绝对居中，参数已整体放大 1.5 倍) -->
    <g transform="translate(256, 256)">
        <!-- 星轨 (后半部分) -->
        <ellipse cx="0" cy="0" rx="225" ry="67.5" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4.5" transform="rotate(-20)" />

        <!-- 星轨上的能量高光 -->
        <path d="M -210 -30 A 225 67.5 0 0 1 0 -67.5" fill="none" stroke="#FF7A00" stroke-width="4.5" transform="rotate(-20)" filter="url(#glow)" stroke-linecap="round" />

        <!-- 火星本体 (半径从 80 扩大到了 120) -->
        <circle cx="0" cy="0" r="120" fill="url(#mars-grad)" filter="url(#glow)" />

        <!-- 星轨 (前半部分 跨越星球上方) -->
        <path d="M -195 33 A 225 67.5 0 0 0 213 22.5" fill="none" stroke="rgba(255, 255, 255, 0.9)" stroke-width="5.5" transform="rotate(-20)" filter="url(#glow)" stroke-linecap="round" />

        <!-- 毛玻璃圆角播放按钮 (同步等比例放大) -->
        <path d="M -15 -37.5 Q -15 -52.5 0 -45 L 45 -18 Q 60 -9 60 0 Q 60 9 45 18 L 0 45 Q -15 52.5 -15 37.5 Z"
              fill="url(#glass-grad)"
              stroke="rgba(255, 255, 255, 0.7)"
              stroke-width="4"
              filter="drop-shadow(0px 12px 24px rgba(0,0,0,0.5))" />
    </g>
</svg>