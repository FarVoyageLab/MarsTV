name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the v prefix, for example 0.1.0"
        required: true
        default: "0.1.0"
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Generate Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Generate tag
        id: tag
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must match x.y.z, got: $VERSION" >&2
            exit 1
          fi

          timestamp="$(TZ=Asia/Shanghai date +'%Y%m%d.%H%M')"
          tag="v${VERSION}-${timestamp}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

  desktop:
    name: Desktop ${{ matrix.platform.name }}
    needs: tag
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            args: ""
          - name: Windows
            os: windows-latest
            args: ""
          - name: macOS Apple Silicon
            os: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            os: macos-13
            args: "--target x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Apple Silicon Rust target
        if: contains(matrix.platform.args, 'aarch64-apple-darwin')
        run: rustup target add aarch64-apple-darwin

      - name: Add macOS Intel Rust target
        if: contains(matrix.platform.args, 'x86_64-apple-darwin')
        run: rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.platform.args }}
          tagName: ${{ needs.tag.outputs.tag }}
          releaseName: "MarsTV ${{ needs.tag.outputs.tag }}"
          releaseBody: |
            MarsTV desktop release.

            Version: ${{ needs.tag.outputs.version }}
            Tag: ${{ needs.tag.outputs.tag }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
